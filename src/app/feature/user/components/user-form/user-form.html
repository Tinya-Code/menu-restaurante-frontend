<div class="max-w-4xl mx-auto p-2">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-8">
    <!-- User Information -->
    <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
      <h3 class="text-xl font-semibold text-slate-800 mb-6 flex items-center gap-2">
        <span class="p-2 bg-blue-50 text-blue-600 rounded-lg">
          <lucide-angular [img]="Check" size="20"></lucide-angular>
        </span>
        Tus Datos Personales
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Nombre Completo</label>
          <input
            type="text"
            formControlName="display_name"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
            placeholder="Ej. Juan Pérez"
          />
        </div>
        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Teléfono</label>
          <input
            type="text"
            formControlName="phone"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
            placeholder="987 654 321"
          />
        </div>
      </div>
    </section>

    <!-- Restaurant Information -->
    <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
      <h3 class="text-xl font-semibold text-slate-800 mb-6 flex items-center gap-2">
        <span class="p-2 bg-orange-50 text-orange-600 rounded-lg">
          <lucide-angular [img]="MapPin" size="20"></lucide-angular>
        </span>
        Tu Restaurante
      </h3>
      <div class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-1">
            <label class="text-sm font-medium text-slate-700">Nombre del Restaurante</label>
            <input
              type="text"
              formControlName="restaurant_name"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all outline-none"
              placeholder="Ej. El Gran Sabor"
            />
          </div>
          <div class="space-y-1">
            <label class="text-sm font-medium text-slate-700">Teléfono del Local</label>
            <input
              type="text"
              formControlName="phone_restaurant"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all outline-none"
              placeholder="01 234 5678"
            />
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Dirección</label>
          <input
            type="text"
            formControlName="address"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all outline-none"
            placeholder="Av. Las Flores 123, Lima"
          />
        </div>

        <!-- Leaflet Map -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
            Ubicación en el Mapa
            <span class="text-xs font-normal text-slate-500">(Mueve el pin para ajustar)</span>
          </label>
          <div
            class="relative w-full h-[300px] rounded-2xl overflow-hidden border border-slate-200 shadow-inner"
          >
            <app-map (locationChanged)="onLocationChange($event)"></app-map>
          </div>
        </div>
      </div>
    </section>

    <!-- Submit Button -->
    <div class="flex flex-col items-center gap-4 py-8">
      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="group relative w-full max-w-md px-8 py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg shadow-xl shadow-slate-200 hover:bg-slate-800 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed transition-all overflow-hidden"
      >
        @if (!loading() && !success()) {
          <span class="flex items-center justify-center gap-2">
            Crear mi Menú Digital
            <lucide-angular
              [img]="Check"
              size="20"
              class="group-hover:translate-x-1 transition-transform"
            ></lucide-angular>
          </span>
        }

        @if (loading()) {
          <span class="flex items-center justify-center gap-2 text-slate-300">
            <lucide-angular [img]="Loader2" size="24" class="animate-spin"></lucide-angular>
            Procesando...
          </span>
        }

        @if (success()) {
          <span class="flex items-center justify-center gap-2 text-green-400">
            ¡Listo! Redirigiendo...
            <lucide-angular [img]="Check" size="24"></lucide-angular>
          </span>
        }
      </button>

      <p class="text-xs text-slate-400 text-center max-w-xs">
        Al hacer clic, aceptas nuestros Términos de Servicio y la Política de Privacidad.
      </p>
    </div>
  </form>
</div>
