@if (fullScreen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-white p-4">
    <div class="flex flex-col items-center gap-6 sm:gap-8">
      @if (logoUrl()) {
        <img [src]="logoUrl()" alt="Logo" class="{{ logoSizeClasses }} object-contain" />
      }
      <lucide-icon
        [img]="Loader2"
        class="animate-spin text-neutral-400 {{ sizeClasses }}"
      ></lucide-icon>
      @if (text()) {
        <p class="text-sm sm:text-base text-neutral-500">{{ text() }}</p>
      }
    </div>
  </div>
} @else {
  <div class="flex items-center justify-center p-4">
    <div class="flex flex-col items-center gap-4 sm:gap-6">
      @if (logoUrl()) {
        <img [src]="logoUrl()" alt="Logo" class="{{ logoSizeClasses }} object-contain" />
      }
      <lucide-icon
        [img]="Loader2"
        class="animate-spin text-neutral-400 {{ sizeClasses }}"
      ></lucide-icon>
      @if (text()) {
        <p class="text-sm sm:text-base text-neutral-500">{{ text() }}</p>
      }
    </div>
  </div>
}
