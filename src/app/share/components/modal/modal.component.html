<!-- Backdrop -->
<button
  aria-label="Cerrar modal"
  class="fixed inset-0 bg-black/30 backdrop-blur-[6px] z-1000 transition-all duration-300"
  [class.opacity-0]="!isOpen()" 
  [class.pointer-events-none]="!isOpen()"
  (click)="onClose()">
</button>

<!-- Modal -->
<section 
  role="dialog"
  aria-modal="true"
  class="fixed bottom-0 left-0 right-0 z-1001 flex justify-center pointer-events-none">

  <article 
    class="w-full max-w-2xl bg-white rounded-t-[28px] shadow-2xl 
           transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)]
           pointer-events-auto
           translate-y-full"
    [class.!translate-y-0]="isOpen()">

    <!-- Handle (decorativo) -->
    <header class="flex flex-col items-center pt-3">

      <span 
        aria-hidden="true"
        class="w-12 h-1.5 bg-slate-300 rounded-full">
      </span>

      <nav class="w-full flex items-center justify-between px-5 py-3">

        <h2 class="font-bungee text-base text-slate-800 truncate">
          {{ title() }}
        </h2>

        <button 
          type="button"
          aria-label="Cerrar"
          (click)="onClose()" 
          class="p-2 rounded-full text-slate-400 hover:bg-slate-100 hover:text-slate-700 transition">
          <lucide-icon [img]="X" class="w-5 h-5"></lucide-icon>
        </button>

      </nav>

    </header>

    <hr class="border-slate-100" />

    <!-- Content -->
    <main 
      class="max-h-[75vh] overflow-y-auto px-5 py-4 
             scrollbar-thin scrollbar-thumb-slate-200 hover:scrollbar-thumb-slate-300">
      <ng-content></ng-content>
    </main>

  </article>
</section>
