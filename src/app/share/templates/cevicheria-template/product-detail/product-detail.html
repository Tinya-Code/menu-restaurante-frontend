<section class="space-y-8">

  <!-- Información del producto -->
  <header class="space-y-4 text-center">

    <p
      class="inline-block bg-primary/10 text-primary px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.3em]"
    >
      Signature Dish
    </p>

    <p class="text-5xl font-bungee text-secondary">
      {{ product().price | precio }}
    </p>

    <p class="text-muted leading-relaxed text-lg italic px-4">
      {{
        product().description ||
        'Frescura incomparable preparada al momento con la pesca del día y limones seleccionados.'
      }}
    </p>

  </header>

  <!-- Selector de cantidad -->
  <section
    aria-label="Selector de unidades"
    class="flex items-center justify-between p-4 bg-primary/5 rounded-2xl border-2 border-primary/10"
  >

    <span
      class="text-xs font-black uppercase tracking-widest text-secondary opacity-60"
    >
      Unidades
    </span>

    <menu class="flex items-center gap-4">

      <li>
        <button
          (click)="decrease()"
          [disabled]="quantity() <= 1"
          class="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-md hover:text-primary transition-all disabled:opacity-30"
        >
          <lucide-icon [img]="Minus" class="w-5 h-5"></lucide-icon>
        </button>
      </li>

      <li>
        <output
          class="w-8 text-center font-bungee text-2xl text-secondary"
        >
          {{ quantity() }}
        </output>
      </li>

      <li>
        <button
          (click)="increase()"
          class="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-md hover:text-primary transition-all"
        >
          <lucide-icon [img]="Plus" class="w-5 h-5"></lucide-icon>
        </button>
      </li>

    </menu>

  </section>

  <!-- Acción principal -->
  <footer>

    <button
      (click)="onAddToCart()"
      class="w-full bg-secondary text-white py-5 rounded-2xl font-bungee text-xl shadow-premium hover:bg-primary transition-all flex items-center justify-center gap-4 uppercase tracking-widest"
    >
      <lucide-icon [img]="ShoppingBag" class="w-6 h-6"></lucide-icon>
      Añadir al Pedido
    </button>

  </footer>

</section>
