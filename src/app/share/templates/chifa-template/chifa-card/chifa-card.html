<div class="group relative bg-secondary/5 backdrop-blur-sm border-l-4 border-primary p-6 hover:bg-secondary/10 transition-all duration-300 rounded-r-2xl overflow-hidden">
  <div class="absolute right-4 top-4 opacity-10 group-hover:opacity-20 transition-opacity">
    <lucide-icon [img]="Star" class="w-12 h-12 text-primary"></lucide-icon>
  </div>

  <div class="relative z-10 flex justify-between items-start gap-4 mb-3">
    <div class="flex-1">
      <h3 class="text-2xl font-bungee text-secondary tracking-tight group-hover:text-primary transition-colors">
        {{ product().name }}
      </h3>
      <div class="flex items-center gap-2 mt-1">
        <lucide-icon [img]="Utensils" class="w-3 h-3 text-primary"></lucide-icon>
        <span class="text-[10px] font-bold uppercase tracking-widest text-muted">Receta Tradicional</span>
      </div>
    </div>
    <div class="text-right">
      <span class="text-xl font-bungee text-primary">{{ product().price | precio }}</span>
    </div>
  </div>

  <p class="text-muted text-sm leading-relaxed max-w-[85%] border-t border-secondary/10 pt-3 italic">
    {{ product().description || 'Un clásico del Chifa preparado con los secretos mejor guardados de nuestra cocina.' }}
  </p>
  
  <div class="absolute bottom-0 right-0 w-16 h-16 bg-primary opacity-0 group-hover:opacity-10 transition-opacity rounded-tl-full translate-x-4 translate-y-4"></div>
</div>
