<div class="absolute top-0 left-0 w-full h-full -z-30 bg-[#F4D5C4]"></div>
<div class="space-y-8 grid grid-cols-1 md:grid-cols-2 max-w-4xl mx-auto gap-4">
  <img
    src="/assets/template-chifa-images/tronco.svg"
    alt="tronco derecho"
    class="absolute select-none w-auto h-full -z-20 top-24 md:top-20 right-4 scale-150"
  />
  <img
    src="/assets/template-chifa-images/follaje-derecha.svg"
    alt=""
    class="absolute select-none -z-10 w-150 -top-10 md:-top-15 scale-120 -right-15"
  />
  <img
    src="/assets/template-chifa-images/follaje-izquierda.svg"
    alt=""
    class="absolute select-none -z-20 w-150 top-0 md:-top-40 -left-10 scale-125"
  />
  <img
    src="/assets/template-chifa-images/tronco-2.svg"
    alt="tronco medio"
    class="absolute select-none w-auto h-full scale-115 -z-20 top-6 right-40"
  />
  <img
    src="/assets/template-chifa-images/tronco.svg"
    alt="tronco izquierdo"
    class="absolute select-none w-auto h-full md:scale-200 -z-30 top-0 md:top-20 left-20"
  />
  <div class="space-y-6">
    <div class="flex flex-col gap-2">
      <p
        class="text-4xl [-webkit-text-stroke:1px_black] font-display text-transparent bg-clip-text bg-gradient-to-b from-primary-text from-50% to-secondary-text to-50%"
      >
        {{ product().price | precio }}
      </p>
      <div class="w-16 h-1 bg-secondary rounded-full"></div>
      <p
        class="text-secondary font-semibold border-primary/10 rounded-sm bg-secondary/10 backdrop-blur-xl p-4 font-body leading-relaxed text-lg border pl-4"
      >
        {{
          product().description ||
            'Un clásico del Chifa preparado con los secretos mejor guardados de nuestra cocina oriental.'
        }}
      </p>
    </div>

    <div
      class="flex items-center justify-between p-4 bg-secondary/10 backdrop-blur-xl rounded-sm border border-primary/10"
    >
      <span class="text-xs font-bold uppercase tracking-widest text-secondary">Cantidad</span>
      <div class="flex items-center gap-6">
        <button
          (click)="decrease()"
          class="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm hover:text-primary transition-all disabled:opacity-30"
          [disabled]="quantity() <= 1"
        >
          <lucide-icon [img]="Minus" class="w-5 h-5"></lucide-icon>
        </button>
        <span class="w-8 text-center font-bungee text-2xl text-secondary">{{ quantity() }}</span>
        <button
          (click)="increase()"
          class="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm hover:text-primary transition-all"
        >
          <lucide-icon [img]="Plus" class="w-5 h-5"></lucide-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <button
      (click)="onAddToCart()"
      class="w-full bg-gradient-to-b from-accent from-50% to-accent-muted to-50% text-primary-text active:scale-95 py-4 rounded-sm font-display text-xl transition-all flex items-center justify-center gap-4"
    >
      <lucide-icon [img]="ShoppingBag" class="w-6 h-6"></lucide-icon>

      Agregar al Carrito
    </button>

    <button
      (click)="orderViaWhatsApp()"
      class="w-full bg-green-600 active:scale-95 text-white py-4 rounded-sm font-bungee text-xl transition-all flex items-center justify-center gap-4"
    >
      <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
        />
      </svg>
      Pedir por WhatsApp
    </button>
  </div>
</div>
