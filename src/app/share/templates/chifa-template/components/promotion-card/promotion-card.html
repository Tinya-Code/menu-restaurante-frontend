<div
  class="group bg-gradient-to-br from-accent/10 to-accent/5 hover:from-accent/20 hover:to-accent/10 relative w-90 min-h-60 p-6 transition-all duration-300 overflow-hidden cursor-pointer active:scale-[0.99] rounded-sm border-2 border-accent/40 hover:border-accent flex flex-col"
>
  <!-- Promotional Badge -->
  <div
    class="absolute top-4 right-4 bg-accent text-primary-text px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider"
  >
    Oferta
  </div>

  <div class="relative z-10 flex flex-col h-full gap-4">
    <div class="flex-1 flex flex-col gap-3 pt-8">
      <h3
        class="text-2xl font-display text-transparent bg-clip-text bg-gradient-to-b from-accent from-50% to-accent-muted to-50% tracking-tight line-clamp-2"
      >
        {{ promotion().name }}
      </h3>
      <p class="text-primary-text font-body text-base leading-relaxed line-clamp-3">
        {{ promotion().description }}
      </p>
    </div>

    <div class="flex flex-col gap-3 pt-4 mt-auto">
      <div class="flex items-baseline gap-3">
        <span class="text-lg font-display text-primary-text/50 line-through">
          {{ promotion().price | precio }}
        </span>
        <span
          class="text-3xl font-display text-transparent bg-clip-text bg-gradient-to-b from-accent from-50% to-accent-muted to-50%"
        >
          {{ promotion().discountedPrice | precio }}
        </span>
      </div>

      <app-add-button (clicked)="addToCart.emit(promotion())"></app-add-button>
    </div>
  </div>
</div>
